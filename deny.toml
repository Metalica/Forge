[graph]
all-features = true
targets = [
  "x86_64-pc-windows-gnu",
  "x86_64-unknown-linux-gnu",
]

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
# Accepted transitive advisories blocked on upstream floem/winit GTK migration.
# Keep this list aligned with `.cargo/audit-policy.json`.
ignore = [
  "RUSTSEC-2024-0412",
  "RUSTSEC-2024-0413",
  "RUSTSEC-2024-0415",
  "RUSTSEC-2024-0416",
  "RUSTSEC-2024-0418",
  "RUSTSEC-2024-0419",
  "RUSTSEC-2024-0420",
  "RUSTSEC-2024-0436",
  "RUSTSEC-2024-0370",
]

[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
]
confidence-threshold = 0.8

[bans]
# Floem/wgpu currently brings unavoidable target-specific duplicate crates.
# Keep this set to allow until dependency graph can be reduced.
multiple-versions = "allow"
# Workspace path dependencies are used during active modular development.
wildcards = "allow"
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = [
  "https://github.com/lapce/floem",
  "https://github.com/lapce/winit",
  "https://github.com/lapce/vger-rs",
  "https://github.com/jrmoulton/understory",
]
